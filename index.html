<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cursor Cat Studio — Client & Onboarding Hub</title>
<link rel="icon" type="image/png" href="crestcatccdlogo.png"/>

:root{
  --bg:#d7d9dd;--surface:#fafbfc;--surface-2:#cbced3;
  --ink:#08090a;--ink-2:#16171a;--muted:#4d4f54;--muted-2:#7a7c83;
  --line:rgba(0,0,0,.16);--line-2:rgba(0,0,0,.08);

  --r:8px;--r-lg:12px;

  --chrome:linear-gradient(165deg,#6a6d75 0%,#101114 38%,#474a52 58%,#0d0e10 100%);

  --font-b:"Inter",system-ui,sans-serif;
  --font-m:"JetBrains Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{cursor:var(--cur),auto}
a,button,summary,label,select,[role=button],.tab,.cl-item,.chip,.stage-pill{cursor:var(--cur),pointer}
input,textarea{cursor:text}
body{font-family:var(--font-b);background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--font-d);font-weight:700;letter-spacing:-.02em;line-height:1.1}
a{color:inherit;text-decoration:none}
.mono{font-family:var(--font-m);font-size:.7rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2)}
.chrome-text{background:var(--chrome);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--surface-2);border-radius:6px}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-b);font-weight:600;font-size:.9rem;padding:11px 18px;border-radius:var(--r);border:1px solid transparent;background:var(--ink);color:var(--surface);transition:.16s;white-space:nowrap}
.btn:hover{background:var(--accent);transform:translateY(-1px);box-shadow:0 14px 30px -14px rgba(47,100,230,.6)}
.btn-ghost{background:transparent;color:var(--ink);border-color:var(--line)}
.btn-ghost:hover{background:transparent;border-color:var(--accent);color:var(--accent);box-shadow:none}
.btn-sm{padding:8px 13px;font-size:.82rem}
.btn-danger{background:transparent;color:#b42318;border-color:rgba(180,35,24,.35)}
.btn-danger:hover{background:#b42318;color:#fff;box-shadow:none}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* ---------- top bar ---------- */
.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;gap:18px;height:68px;padding:0 22px;background:rgba(215,217,221,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:12px}
.brand img{height:34px;width:auto}
.brand-word{font-family:var(--font-d);font-weight:700;font-size:1.05rem;letter-spacing:-.01em;line-height:1;display:flex;flex-direction:column}
.brand-word small{font-family:var(--font-m);font-size:.54rem;letter-spacing:.22em;color:var(--muted-2);font-weight:500;margin-top:3px}
.top-actions{display:flex;align-items:center;gap:10px}
.icon-btn{width:38px;height:38px;display:grid;place-items:center;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);color:var(--ink);font-size:1rem;transition:.16s}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ---------- layout ---------- */
.layout{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 68px)}
.sidebar{border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;background:var(--bg)}
.side-head{padding:18px 18px 12px}
.search{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:10px 13px;font-family:var(--font-b);font-size:.9rem;color:var(--ink)}
.search:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.pipeline{display:flex;flex-wrap:wrap;gap:6px;padding:0 18px 14px}
.pp{font-family:var(--font-m);font-size:.6rem;letter-spacing:.04em;text-transform:uppercase;border:1px solid var(--line);border-radius:99px;padding:4px 9px;color:var(--muted);background:var(--surface);display:flex;gap:6px;align-items:center}
.pp b{color:var(--ink);font-family:var(--font-d)}
.cl-list{flex:1;overflow-y:auto;padding:4px 12px 18px}
.cl-item{display:flex;flex-direction:column;gap:5px;padding:13px 14px;border:1px solid var(--line);border-radius:var(--r);background:var(--surface);margin-bottom:8px;transition:.14s}
.cl-item:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:var(--sh-sm)}
.cl-item.active{border-color:var(--ink);box-shadow:var(--sh)}
.cl-top{display:flex;justify-content:space-between;align-items:center;gap:10px}
.cl-name{font-family:var(--font-d);font-weight:700;font-size:.98rem}
.cl-sub{font-size:.82rem;color:var(--muted)}
.stage-pill{font-family:var(--font-m);font-size:.56rem;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:99px;white-space:nowrap;font-weight:600}
.empty-side{padding:40px 18px;text-align:center;color:var(--muted-2);font-size:.88rem}

/* ---------- main ---------- */
.main{overflow-y:auto;min-height:0;position:relative}
.client-head{position:sticky;top:0;z-index:10;background:rgba(215,217,221,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:18px 26px}
.ch-top{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;flex-wrap:wrap}
.ch-name{font-size:1.5rem}
.ch-meta{font-size:.88rem;color:var(--muted);margin-top:2px}
.ch-actions{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.tabs{display:flex;gap:3px;margin-top:16px;flex-wrap:wrap}
.tab{font-family:var(--font-m);font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);background:transparent;border:1px solid transparent;border-radius:99px;padding:8px 15px;transition:.14s}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--surface);background:var(--ink);border-color:var(--ink)}
.tab-body{padding:26px}

/* ---------- details form ---------- */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 20px;max-width:900px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1 / -1}
.field label{font-family:var(--font-m);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2)}
.field input,.field select,.field textarea{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:11px 13px;font-family:var(--font-b);font-size:.92rem;color:var(--ink)}
.field textarea{resize:vertical;min-height:74px;line-height:1.5;font-size:.88rem}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.field .hint{font-size:.72rem;color:var(--muted-2)}
.save-bar{position:sticky;bottom:0;display:flex;justify-content:flex-end;gap:10px;padding:16px 26px;background:rgba(215,217,221,.92);backdrop-filter:blur(8px);border-top:1px solid var(--line);margin:0 -26px -26px}

/* ---------- doc preview ---------- */
.doc-toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.doc-toolbar .mono{color:var(--muted-2)}
.doc-scroll{display:flex;justify-content:center}
.doc{width:820px;max-width:100%;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh);padding:54px 52px;color:var(--ink);line-height:1.62}
.doc h1,.doc h2,.doc h3{font-family:var(--font-d)}
.doc p{color:var(--muted)}
.doc .eyebrow{display:inline-flex;align-items:center;gap:9px;margin-bottom:14px;font-family:var(--font-m);font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.doc .eyebrow::before{content:"";width:7px;height:7px;background:var(--ink);transform:rotate(45deg)}
.doc .eyebrow.acc::before{background:var(--accent)}
.doc-header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--line);padding-bottom:22px;margin-bottom:30px}
.doc-word{font-family:var(--font-d);font-weight:700;font-size:1.4rem;line-height:1;display:flex;align-items:center;gap:11px}
.doc-word small{font-family:var(--font-m);font-size:.5rem;letter-spacing:.2em;color:var(--muted-2);display:block;margin-top:4px}
.doc-word img{height:34px}
.doc-meta{text-align:right}
.doc-meta .id{font-family:var(--font-d);font-weight:700;margin-top:3px}
.doc-foot{margin-top:40px;padding-top:18px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;font-family:var(--font-m);font-size:.6rem;letter-spacing:.06em;color:var(--muted-2)}
.sec{margin-bottom:40px}
.sec-h{font-size:1.35rem;margin-bottom:12px}
.to{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:0 var(--r) var(--r) 0;padding:16px 20px;margin-bottom:26px;box-shadow:var(--sh-sm);display:inline-block}
.to .l{font-family:var(--font-m);font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);margin-bottom:4px}
.to .n{font-family:var(--font-d);font-weight:700;font-size:1.05rem}
.to .b{font-size:.88rem;color:var(--muted);margin-top:2px}
.list{border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;background:var(--surface);box-shadow:var(--sh-sm)}
.li{display:flex;gap:12px;align-items:flex-start;padding:14px 18px;border-bottom:1px solid var(--line-2)}
.li:last-child{border-bottom:none}
.li .dot{width:20px;height:20px;border-radius:50%;background:var(--accent);display:grid;place-items:center;flex-shrink:0;margin-top:1px;color:#fff;font-size:.7rem;font-weight:700}
.li .t{font-family:var(--font-d);font-weight:600;font-size:.93rem}
.li .d{font-size:.85rem;color:var(--muted);margin-top:1px}
.gap{display:flex;gap:12px;align-items:flex-start;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 18px;margin-bottom:8px;box-shadow:var(--sh-sm)}
.gap .ic{width:26px;height:26px;border-radius:50%;background:var(--accent-soft);border:1px solid rgba(47,100,230,.3);color:var(--accent);display:grid;place-items:center;flex-shrink:0;font-weight:700;font-size:.8rem}
.gap .x{font-size:.92rem;color:var(--muted)}
.tl{display:flex;flex-direction:column}
.tlrow{display:flex;gap:16px}
.tll{display:flex;flex-direction:column;align-items:center;width:18px;flex-shrink:0}
.tld{width:9px;height:9px;border-radius:50%;background:var(--accent);margin-top:5px}
.tlline{width:1px;flex:1;background:var(--line);margin:3px 0;min-height:16px}
.tlrow:last-child .tlline{display:none}
.tlw{font-family:var(--font-m);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-weight:600}
.tlx{font-size:.9rem;color:var(--muted)}
.tlbody{padding-bottom:22px}
.invest{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh-sm)}
.irow{display:flex;justify-content:space-between;padding:14px 22px;border-bottom:1px solid var(--line-2);font-size:.92rem}
.irow:last-of-type{border-bottom:none}
.irow .v{font-family:var(--font-d);font-weight:600}
.itot{display:flex;justify-content:space-between;align-items:center;padding:20px 22px;background:var(--ink)}
.itot .l{font-family:var(--font-m);font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.55)}
.itot .v{font-family:var(--font-d);font-size:1.9rem;font-weight:700}
.inote{font-family:var(--font-m);font-size:.58rem;letter-spacing:.06em;text-align:center;color:var(--muted-2);padding:11px 22px;border-top:1px solid var(--line)}
.dark{background:var(--ink);border-radius:var(--r-lg);padding:26px 28px;box-shadow:var(--sh-sm)}
.dark h3{color:#fff;margin-bottom:7px;font-size:1.1rem}
.dark p{color:rgba(255,255,255,.74)}
.parties{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:32px}
.party{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px 18px;box-shadow:var(--sh-sm)}
.party .l{font-family:var(--font-m);font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:7px}
.party .n{font-family:var(--font-d);font-weight:700;font-size:1rem}
.party .d{font-size:.84rem;color:var(--muted);line-height:1.65;margin-top:3px}
.clause{margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--line-2)}
.clause:last-child{border-bottom:none}
.clause-h{display:flex;align-items:center;gap:12px;margin-bottom:9px}
.clause-n{width:26px;height:26px;border-radius:50%;background:var(--ink);color:#fff;font-family:var(--font-d);font-weight:700;font-size:.78rem;display:grid;place-items:center;flex-shrink:0}
.clause-t{font-family:var(--font-d);font-weight:700;font-size:1rem}
.clause-b{padding-left:38px}
.clause-b p{font-size:.9rem;margin-bottom:8px}
.clause-b ul{list-style:none;display:flex;flex-direction:column;gap:6px;margin:8px 0}
.clause-b li{position:relative;padding-left:16px;font-size:.88rem;color:var(--muted)}
.clause-b li::before{content:"\2192";position:absolute;left:0;color:var(--accent);font-weight:700}
.sig{margin-top:40px;padding-top:30px;border-top:1px solid var(--line)}
.sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:20px}
.sig .p{font-family:var(--font-m);font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:38px}
.sig .ln{border-bottom:1px solid var(--line);margin-bottom:8px}
.sig .f{font-size:.76rem;color:var(--muted-2)}
.sig .nm{font-family:var(--font-d);font-weight:700;margin-top:4px}
.qrow{margin-bottom:16px}
.qlab{font-family:var(--font-d);font-weight:600;font-size:.92rem;margin-bottom:6px}
.qlab b{color:var(--accent)}
.qbox{border:1px solid var(--line);border-radius:var(--r);min-height:40px;background:var(--bg)}
.qbox.tall{min-height:64px}
.fgrp{margin-bottom:30px}
.fgrp-h{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.fgrp-n{font-family:var(--font-m);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:#fff;background:var(--ink);padding:4px 9px;border-radius:5px}
.fgrp-t{font-family:var(--font-d);font-weight:700;font-size:1.1rem}
table.inv{width:100%;border-collapse:collapse;border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh-sm);margin-bottom:20px}
table.inv th{background:var(--ink);color:#fff;font-family:var(--font-m);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;text-align:left;padding:12px 16px}
table.inv th.r,table.inv td.r{text-align:right}
table.inv td{padding:13px 16px;border-bottom:1px solid var(--line-2);font-size:.9rem;color:var(--muted)}
table.inv tr:last-child td{border-bottom:none}
table.inv td.it{color:var(--ink);font-weight:600;font-family:var(--font-d)}
.tot{margin-left:auto;width:290px}
.totr{display:flex;justify-content:space-between;padding:8px 0;font-size:.9rem;color:var(--muted)}
.totr.g{border-top:2px solid var(--ink);margin-top:4px;padding-top:12px}
.totr.g .k{font-family:var(--font-m);font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);align-self:center}
.totr.g .v{font-family:var(--font-d);font-size:1.7rem;font-weight:700}

/* ---------- modal / login / toast ---------- */
.overlay{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(18,18,20,.45);backdrop-filter:blur(5px);padding:20px}
.overlay.open{display:flex}
.modal{width:min(460px,94vw);background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:0 40px 90px -30px rgba(0,0,0,.6);overflow:hidden}
.modal-h{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.modal-h h3{font-size:1.1rem}
.modal-b{padding:22px 24px;display:flex;flex-direction:column;gap:14px}
.modal-b .field label{color:var(--muted)}
.login-wrap{position:fixed;inset:0;z-index:150;display:grid;place-items:center;background:var(--bg);padding:20px}
.login-card{width:min(420px,94vw);text-align:center}
.login-card .cat{width:84px;margin:0 auto 18px}
.login-card .word{font-family:var(--font-d);font-weight:700;font-size:1.7rem;letter-spacing:-.02em}
.login-card .word small{display:block;font-family:var(--font-m);font-size:.56rem;letter-spacing:.24em;color:var(--muted-2);margin-top:5px}
.login-card form{margin-top:26px;display:flex;flex-direction:column;gap:13px;text-align:left}
.login-msg{font-size:.84rem;min-height:20px;margin-top:4px}
.login-msg.err{color:#b42318}.login-msg.ok{color:#1a7f37}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);z-index:300;background:var(--ink);color:#fff;font-size:.88rem;font-weight:500;padding:12px 20px;border-radius:99px;box-shadow:var(--sh);opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.bell-badge{position:absolute;top:-5px;right:-5px;min-width:16px;height:16px;padding:0 4px;border-radius:99px;background:var(--accent);color:#fff;font-size:.58rem;font-weight:700;display:grid;place-items:center;font-family:var(--font-m)}
.bell-panel{position:absolute;top:46px;right:0;width:330px;max-height:440px;overflow-y:auto;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh);z-index:60;padding:8px}
.bell-item{display:block;padding:11px 12px;border-radius:var(--r);border-bottom:1px solid var(--line-2)}
.bell-item:last-child{border-bottom:none}
.bell-item.unread{background:var(--accent-soft)}
.bell-item .bt{font-size:.88rem;color:var(--ink)}
.bell-item .bd{font-size:.7rem;color:var(--muted-2);font-family:var(--font-m);margin-top:3px}
.bell-empty{padding:26px;text-align:center;color:var(--muted-2);font-size:.86rem}
.menu-btn{display:none}
@media(max-width:860px){.menu-btn{display:grid}.sidebar.show{box-shadow:var(--sh)}}
@media(max-width:640px){#dashBtn{display:none}.topbar{padding:0 14px}.top-actions{gap:7px}.tab-body{padding:18px 14px}.bell-panel{width:min(320px,92vw)}.client-head{padding:16px 16px}.brand img{height:30px}.doc{padding:26px 18px}}
.linkbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.acc{border:1px solid var(--line);border-radius:var(--r-lg);background:var(--surface);margin-bottom:12px;overflow:hidden;box-shadow:var(--sh-sm)}
.acc-h{width:100%;display:flex;justify-content:space-between;align-items:center;gap:12px;background:none;border:0;font-family:var(--font-d);font-weight:700;font-size:1rem;color:var(--ink);padding:15px 18px;text-align:left}
.acc-h:hover{color:var(--accent)}
.acc-h .chev{font-family:var(--font-d);font-size:1.4rem;line-height:1;color:var(--muted-2);font-weight:400;flex-shrink:0}
.acc-body{display:none;padding:2px 18px 18px}
.acc-body.open{display:block}
.acc .form-grid{max-width:none}
.board{display:flex;gap:12px;overflow-x:auto;padding:20px 26px;min-height:60vh}
.kcol{flex:0 0 240px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r-lg);padding:10px;min-height:200px;transition:.14s}
.kcol.drag-over{border-color:var(--accent);background:var(--accent-soft)}
.kcol-h{font-family:var(--font-m);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);display:flex;justify-content:space-between;align-items:center;padding:6px 8px 10px}
.kcol-h span{color:var(--ink);font-family:var(--font-d);font-weight:700}
.kcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:12px 13px;margin-bottom:8px;box-shadow:var(--sh-sm);cursor:grab}
.kcard:hover{border-color:var(--accent);transform:translateY(-1px)}
.kcard:active{cursor:grabbing}
.kc-name{font-family:var(--font-d);font-weight:700;font-size:.92rem}
.kc-sub{font-size:.8rem;color:var(--muted);margin-top:2px}
.cmdk{position:fixed;inset:0;z-index:120;display:none;align-items:flex-start;justify-content:center;padding-top:12vh;background:rgba(18,18,20,.4);backdrop-filter:blur(4px)}
.cmdk.open{display:flex}
.cmdk-box{width:min(560px,92vw);background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--sh);overflow:hidden}
.cmdk-box input{width:100%;border:0;border-bottom:1px solid var(--line);padding:16px 18px;font-family:var(--font-b);font-size:1rem;color:var(--ink);outline:none;background:none}
.cmdk-list{max-height:52vh;overflow-y:auto;padding:6px}
.cmdk-item{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--r);cursor:pointer}
.cmdk-item:hover,.cmdk-item.active{background:var(--accent-soft)}
.cmdk-item .cmdk-sub{font-family:var(--font-m);font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted-2)}
.cmdk-empty{padding:24px;text-align:center;color:var(--muted-2);font-size:.88rem}
.tab-body,.board{animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.tabs{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{height:0}
@media(max-width:640px){.tabs{flex-wrap:nowrap;padding-bottom:6px}.tab{flex:0 0 auto}}
.hidden{display:none!important}

@media(max-width:860px){.layout{grid-template-columns:1fr}.sidebar{display:none}.sidebar.show{display:flex;position:fixed;inset:68px 0 0;z-index:30}.form-grid,.parties,.sig-grid{grid-template-columns:1fr}.doc{padding:32px 24px}}

@media print{
  body{background:#fff}
  .topbar,.client-head,.sidebar,.doc-toolbar,.save-bar{display:none!important}
  .tab-body{padding:0}
  .doc{box-shadow:none;border:none;width:100%;padding:0}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login">
  <div class="login-card">
    <img class="cat" src="crestcatccdlogo.png" alt="Cursor Cat"/>
    <div class="word">CURSOR CAT<small>STUDIO</small></div>
    <form id="loginForm" autocomplete="on">
      <div class="field"><label>Email</label><input type="email" id="loginEmail" required/></div>
      <div class="field"><label>Password</label><input type="password" id="loginPass" required/></div>
      <button class="btn" type="submit" style="justify-content:center;margin-top:4px">Sign in</button>
      <div class="login-msg" id="loginMsg"></div>
      <button type="button" class="btn-ghost btn btn-sm" id="openSettingsFromLogin" style="justify-content:center">Connection settings</button>
      <button type="button" class="btn-ghost btn btn-sm" id="demoBtn" style="justify-content:center">Preview with sample data →</button>
    </form>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px;min-width:0">
      <button class="icon-btn menu-btn" id="menuBtn" title="Menu">&#9776;</button>
      <div class="brand" id="brandHome" style="cursor:pointer">
        <img src="crestcatccdlogo.png" alt="Cursor Cat"/>
        <div class="brand-word"><span class="chrome-text">CURSOR CAT</span><small>STUDIO</small></div>
      </div>
    </div>
    <div class="top-actions">
      <button class="btn-ghost btn btn-sm" id="dashBtn">Dashboard</button>
      <button class="btn-ghost btn btn-sm" id="boardBtn">Board</button>
      <button class="btn btn-sm" id="newClientBtn">+ New Client</button>
      <div style="position:relative">
        <button class="icon-btn" id="bellBtn" title="Notifications">&#128276;<span id="bellBadge" class="bell-badge hidden">0</span></button>
        <div id="bellPanel" class="bell-panel hidden"></div>
      </div>
      <button class="icon-btn" id="settingsBtn" title="Settings">&#9881;</button>
      <button class="icon-btn" id="logoutBtn" title="Sign out">&#8629;</button>
    </div>
  </div>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="side-head"><input class="search" id="search" placeholder="Search clients..."/></div>
      <div class="pipeline" id="pipeline"></div>
      <div class="cl-list" id="clList"></div>
    </aside>
    <main class="main" id="main"></main>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="overlay" id="settingsOverlay">
  <div class="modal">
    <div class="modal-h"><h3>Connection settings</h3><button class="icon-btn" id="closeSettings">&times;</button></div>
    <div class="modal-b">
      <p style="font-size:.85rem;color:var(--muted)">Paste your Supabase project URL and anon (public) key. Find them in Supabase &rarr; Project Settings &rarr; API. Stored only in this browser.</p>
      <div class="field"><label>Supabase URL</label><input id="sbUrl" placeholder="https://xxxx.supabase.co"/></div>
      <div class="field"><label>Supabase anon key</label><input id="sbKey" placeholder="eyJhbGci..."/></div>
      <button class="btn" id="saveSettings" style="justify-content:center">Save &amp; reload</button>
    </div>
  </div>
</div>

<div class="cmdk" id="cmdk"><div class="cmdk-box"><input id="cmdkInput" placeholder="Search clients or actions…  (Ctrl/Cmd + K)" autocomplete="off"/><div class="cmdk-list" id="cmdkList"></div></div></div>
<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
/* ============================ CONFIG / STATE ============================ */
var SB_URL_K='ccd_sb_url', SB_KEY_K='ccd_sb_key';
var sb=null, clients=[], current=null, currentTab='details', filter='', demo=false;
var OFFERS=['Free Strategy Plan','Audit Sprint','Local Lead Engine','Local Dominance'];
var STAGES=['Prospect','Proposal Sent','Signed','Deposit Paid','Intake','Kick-off','Active','Closed'];
var STAGE_COLOR={
  'Prospect':['#eef0f3','#4d4f54'],'Proposal Sent':['#e7eefc','#2f64e6'],
  'Signed':['#e7eefc','#2f64e6'],'Deposit Paid':['#e3f3ea','#1a7f37'],
  'Intake':['#fff2da','#9a6b00'],'Kick-off':['#fff2da','#9a6b00'],
  'Active':['#e3f3ea','#1a7f37'],'Closed':['#eef0f3','#7a7c83']
};
var DOC_TABS=[['details','Details'],['proposal','Proposal'],['agreement','Agreement'],['welcome','Welcome'],['intake','Intake'],['invoice','Invoice'],['project','Project'],['payments','Payments']];

/* ============================ HELPERS ============================ */
function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function $(id){return document.getElementById(id);}
function lines(raw){return String(raw||'').split('\n').map(function(s){return s.trim();}).filter(Boolean);}
function pipes(raw){return lines(raw).map(function(l){var i=l.indexOf('|');return i<0?[l.trim(),'']:[l.slice(0,i).trim(),l.slice(i+1).trim()];});}
function toast(m){var t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}
function stagePill(s){var c=STAGE_COLOR[s]||['#eef0f3','#4d4f54'];return '<span class="stage-pill" style="background:'+c[0]+';color:'+c[1]+'">'+esc(s)+'</span>';}
function val(id){var e=$(id);return e?e.value:'';}

/* ============================ SUPABASE / AUTH ============================ */
function getCfg(){return {url:localStorage.getItem(SB_URL_K)||(window.CCD&&window.CCD.url)||'',key:localStorage.getItem(SB_KEY_K)||(window.CCD&&window.CCD.key)||''};}
function initSb(){
  var c=getCfg();
  if(!c.url||!c.key){openSettings(true);return false;}
  try{sb=window.supabase.createClient(c.url,c.key);return true;}
  catch(e){toast('Bad Supabase config');openSettings(true);return false;}
}
async function boot(){
  if(!initSb()){showLogin();return;}
  var s=await sb.auth.getSession();
  if(s.data.session){showApp();await loadClients();}
  else{showLogin();}
}
function showLogin(){$('login').classList.remove('hidden');$('app').classList.add('hidden');}
function showApp(){$('login').classList.add('hidden');$('app').classList.remove('hidden');}

async function doLogin(e){
  e.preventDefault();
  var msg=$('loginMsg');msg.textContent='Signing in...';msg.className='login-msg';
  if(!sb){if(!initSb()){msg.textContent='Set your connection settings first.';msg.className='login-msg err';return;}}
  var r=await sb.auth.signInWithPassword({email:val('loginEmail'),password:val('loginPass')});
  if(r.error){msg.textContent=r.error.message;msg.className='login-msg err';return;}
  msg.textContent='';showApp();await loadClients();
}
async function doLogout(){if(sb)await sb.auth.signOut();current=null;showLogin();}

/* ============================ DATA ============================ */
async function loadClients(){
  var r=await sb.from('clients').select('*').order('created_at',{ascending:false});
  if(r.error){toast('Load failed: '+r.error.message);return;}
  clients=r.data||[];renderSidebar();
  if(current){current=clients.filter(function(c){return c.id===current.id;})[0]||null;}
  await loadDashboard();await loadActivity();subscribeRealtime();
  if(current&&currentTab==='payments')await loadPayments();
  renderMain();
}
function blankClient(){
  var n=clients.length+1, pad=('00'+n).slice(-3);
  return {id:null,business:'',contact_name:'',city:'',email:'',phone:'',offer:'Local Lead Engine',stage:'Prospect',
    website:'',gbp_url:'',service_areas:'',top_services:'',avg_job_value:'',target_jobs:'',competitor:'',notes:'',
    goal:'more booked jobs from Google in the next 90 days',start_week:'',
    proposal_num:'CCD-'+pad,agreement_num:'CCD-SA-'+pad,invoice_num:'CCD-INV-'+pad,packet_num:'CCD-WP-'+pad,
    doc_date:new Date().toLocaleDateString('en-CA',{year:'numeric',month:'long',day:'numeric'}),
    subtotal:'',tax_label:'GST (5%)',tax:'',total:'',deposit:'',balance:'',weeks:'6',
    gaps_raw:'',deliverables_raw:'',timeline_raw:'',line_items_raw:'',scope_raw:'',
    portal_token:'',intake_submitted:false,signed_proposal:null,signed_agreement:null,pay_link:'',monthly:''};
}
function newClient(){current=blankClient();currentTab='details';renderSidebar();renderMain();}
var SAMPLE={id:'demo-1',business:"Smith's Plumbing",contact_name:'Jane Smith',city:'Calgary',email:'jane@smithsplumbing.ca',phone:'403-555-1234',offer:'Local Lead Engine',stage:'Proposal Sent',website:'smithsplumbing.ca',gbp_url:'',service_areas:'Calgary & surrounding',top_services:'Drain cleaning, water heaters, repairs',avg_job_value:'$650',target_jobs:'15',competitor:'ABC Plumbing',notes:'',goal:'more booked jobs from Google in the next 90 days',start_week:'the week of July 7',proposal_num:'CCD-001',agreement_num:'CCD-SA-001',invoice_num:'CCD-INV-001',packet_num:'CCD-WP-001',doc_date:'July 2, 2026',subtotal:'$4,500',tax_label:'GST (5%)',tax:'$225',total:'$4,725',deposit:'$2,362.50',balance:'$2,362.50',weeks:'6',pay_link:'https://buy.stripe.com/test_demo',
gaps_raw:'Google Business Profile has 4 reviews and no photos; your top competitor averages 40+.\nWebsite loads in 7 seconds on mobile — visitors leave before they call.\nNot in the map pack for "plumber Calgary" — where 70% of local clicks go.',
deliverables_raw:'Website Design & Build | 5-page lead-generating site, mobile-first, built to convert.\nGoogle Business Profile Setup | Full optimization: categories, photos, Q&A, review templates.\nCitation Cleanup | NAP consistency across 20+ directories.\nGoogle Ads Campaign | 2 ad groups, conversion tracking wired to your phone.\nDirect Access to Brent | You text the person doing the work.',
timeline_raw:'Week 1 | Kick-off call, access transfer, wireframe review.\nWeek 2-3 | Website build, GBP optimization, citation cleanup.\nWeek 4 | Ads launch, conversion tracking live, first leads.\nWeek 5-6 | Final review, handoff, 30-day support begins.',
line_items_raw:'Website Design & Build | $2,500\nGBP Optimization & Citations | $500\nGoogle Ads Setup & Management | $1,500\nConversion Tracking | Included',
scope_raw:'Website design and development (5-page site)\nGoogle Business Profile optimization\nCitation audit and cleanup\nGoogle Ads campaign setup and 30-day management\nConversion tracking via GA4'};
function enterDemo(){demo=true;clients=[SAMPLE];current=SAMPLE;currentTab='details';showApp();renderSidebar();renderMain();toast('Demo mode — connect Supabase to save real clients');}
async function saveClient(){
  if(!current)return;
  var f=['business','contact_name','city','email','phone','offer','stage','website','gbp_url','service_areas',
    'top_services','avg_job_value','target_jobs','competitor','notes','goal','start_week','proposal_num',
    'agreement_num','invoice_num','packet_num','doc_date','subtotal','tax_label','tax','total','deposit',
    'balance','weeks','gaps_raw','deliverables_raw','timeline_raw','line_items_raw','scope_raw','pay_link','monthly'];
  var rec={};f.forEach(function(k){var e=$('f_'+k);if(e)rec[k]=e.value;});
  if(!rec.business){toast('Business name is required');return;}
  if(demo){Object.assign(current,rec);toast('Demo mode — not saved to database');renderSidebar();renderMain();return;}
  var r;
  if(current.id){r=await sb.from('clients').update(rec).eq('id',current.id).select().single();}
  else{r=await sb.from('clients').insert(rec).select().single();}
  if(r.error){toast('Save failed: '+r.error.message);return;}
  current=r.data;toast('Saved');await loadClients();
}
async function deleteClient(){
  if(demo){toast('Demo mode — nothing to delete');return;}
  if(!current||!current.id){current=null;renderMain();return;}
  if(!confirm('Delete '+(current.business||'this client')+'? This cannot be undone.'))return;
  var r=await sb.from('clients').delete().eq('id',current.id);
  if(r.error){toast('Delete failed: '+r.error.message);return;}
  current=null;toast('Deleted');await loadClients();
}
async function quickStage(s){
  if(demo){current.stage=s;renderSidebar();renderMain();return;}
  if(!current||!current.id){if(current){current.stage=s;renderMain();}return;}
  var r=await sb.from('clients').update({stage:s}).eq('id',current.id);
  if(r.error){toast('Update failed');return;}
  current.stage=s;toast('Moved to '+s);await autoLogPayment(s);await loadClients();
}

/* ============================ SIDEBAR ============================ */
function renderSidebar(){
  var counts={};STAGES.forEach(function(s){counts[s]=0;});
  clients.forEach(function(c){if(counts[c.stage]!=null)counts[c.stage]++;});
  $('pipeline').innerHTML=STAGES.map(function(s){return '<span class="pp">'+esc(s)+' <b>'+counts[s]+'</b></span>';}).join('');
  var list=clients.filter(function(c){
    if(!filter)return true;var q=filter.toLowerCase();
    return (c.business||'').toLowerCase().indexOf(q)>=0||(c.contact_name||'').toLowerCase().indexOf(q)>=0||(c.city||'').toLowerCase().indexOf(q)>=0;
  });
  var el=$('clList');
  if(current&&!current.id){
    el.innerHTML='<div class="cl-item active"><div class="cl-top"><span class="cl-name">New client</span>'+stagePill('Prospect')+'</div><div class="cl-sub">Unsaved — fill in details</div></div>';
  } else { el.innerHTML=''; }
  if(!list.length&&!(current&&!current.id)){el.innerHTML='<div class="empty-side">No clients yet.<br>Click <b>+ New Client</b> to start.</div>';return;}
  el.innerHTML+=list.map(function(c){
    var act=(current&&current.id===c.id)?' active':'';
    return '<div class="cl-item'+act+'" onclick="selectClient(\''+c.id+'\')">'+
      '<div class="cl-top"><span class="cl-name">'+esc(c.business||'Untitled')+'</span>'+stagePill(c.stage)+'</div>'+
      '<div class="cl-sub">'+esc([c.contact_name,c.city].filter(Boolean).join(' · ')||c.offer||'')+'</div></div>';
  }).join('');
}
function selectClient(id){current=clients.filter(function(c){return c.id===id;})[0]||null;currentTab='details';boardMode=false;var sd=$('sidebar');if(sd)sd.classList.remove('show');renderSidebar();renderMain();}

/* ============================ MAIN ============================ */
function renderMain(){
  var m=$('main');
  if(!current){ if(boardMode){m.innerHTML=boardHTML();} else {m.innerHTML=dashboardHTML();setTimeout(drawDashCharts,0);} return; }
  var c=current;
  var head='<div class="client-head"><div class="ch-top"><div>'+
    '<div class="ch-name">'+esc(c.business||'New client')+'</div>'+
    '<div class="ch-meta">'+esc([c.contact_name,c.city?c.city+', Alberta':''].filter(Boolean).join(' · ')||'Unsaved')+'</div></div>'+
    '<div class="ch-actions">'+stageSelect(c)+
      ((c.id&&!demo)?'<button class="btn-ghost btn btn-sm" onclick="copyLink(\'portal\')">⧉ Portal link</button>':'')+
      ((currentTab!=='details'&&currentTab!=='payments'&&currentTab!=='project')?'<button class="btn btn-sm" onclick="exportPDF()">↓ Export PDF</button>':'')+
      (currentTab==='details'?'<button class="btn btn-sm" onclick="saveClient()">Save</button>':'')+
      '<button class="btn-ghost btn btn-sm btn-danger" onclick="deleteClient()">Delete</button>'+
    '</div></div>'+
    '<div class="tabs">'+DOC_TABS.map(function(t){return '<button class="tab'+(currentTab===t[0]?' active':'')+'" onclick="setTab(\''+t[0]+'\')">'+t[1]+'</button>';}).join('')+'</div></div>';
  var inner=currentTab==='details'?detailsForm(c):(currentTab==='payments'?renderPayments(c):(currentTab==='project'?renderProject(c):docPreview(c)));
  m.innerHTML=head+'<div class="tab-body">'+inner+'</div>';
  m.scrollTop=0;
}
function stageSelect(c){
  return '<select onchange="quickStage(this.value)" style="font-family:var(--font-m);font-size:.66rem;letter-spacing:.06em;text-transform:uppercase;padding:8px 11px;border-radius:99px;border:1px solid var(--line);background:var(--surface);color:var(--ink)">'+
    STAGES.map(function(s){return '<option'+(c.stage===s?' selected':'')+'>'+esc(s)+'</option>';}).join('')+'</select>';
}
function setTab(t){currentTab=t;if(t==='payments'){loadPayments().then(renderMain);}else if(t==='project'){loadTasks().then(renderMain);}else{renderMain();}}

/* ---------- details form ---------- */
function fld(label,key,c,o){o=o||{};var v=c[key]||'';
  var input;
  if(o.type==='area'){input='<textarea id="f_'+key+'"'+(o.big?' style="min-height:'+o.big+'px"':'')+'>'+esc(v)+'</textarea>';}
  else if(o.type==='select'){input='<select id="f_'+key+'">'+o.opts.map(function(x){return '<option'+(v===x?' selected':'')+'>'+esc(x)+'</option>';}).join('')+'</select>';}
  else{input='<input id="f_'+key+'" value="'+esc(v)+'"'+(o.ph?' placeholder="'+esc(o.ph)+'"':'')+'/>';}

function exportPDF(){
  var node=$('docNode');if(!node){toast('Open a document tab first');return;}
  var c=current||{};var label=DOC_TABS.filter(function(t){return t[0]===currentTab;});label=label.length?label[0][1]:'Document';
  var name=(label+' - '+(c.business||'client')).replace(/[^a-z0-9 \-]/gi,'').trim()+'.pdf';
  toast('Building PDF...');
  html2pdf().set({margin:[10,10,10,10],filename:name,image:{type:'jpeg',quality:.98},
    html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff'},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
    pagebreak:{mode:['css','legacy']}}).from(node).save();
}

function fmt(n){return '$'+(Math.round(n*100)/100).toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2});}
function rid(n){n=n||28;var a='abcdefghijklmnopqrstuvwxyz0123456789',s='',b=new Uint8Array(n);if(window.crypto&&crypto.getRandomValues){crypto.getRandomValues(b);}else{for(var j=0;j<n;j++)b[j]=Math.floor(Math.random()*256);}for(var i=0;i<n;i++)s+=a[b[i]%a.length];return s;}
function siteBase(){return location.href.split('#')[0].replace(/[^/]*$/,'');}
function signedLn(sig){var d=sig&&sig.signed_at?new Date(sig.signed_at).toLocaleDateString('en-CA'):'';return (sig&&sig.image?'<img src="'+sig.image+'" style="height:44px;display:block;margin-bottom:4px"/>':'<div class="nm" style="font-size:1.2rem;margin-bottom:4px">'+esc(sig.name||'')+'</div>')+'<div class="f" style="color:#1a7f37">✓ Signed electronically '+esc(d)+'</div>';}
function metric(label,value){return '<div style="background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px 18px;box-shadow:var(--sh-sm)"><div class="mono" style="margin-bottom:6px">'+esc(label)+'</div><div class="chrome-text" style="font-family:var(--font-d);font-weight:700;font-size:1.5rem">'+esc(value)+'</div></div>';}

async function ensureToken(){
  if(demo){toast('Demo mode — save a real client to get share links');return null;}
  if(!current||!current.id){toast('Save the client first');return null;}
  if(current.portal_token)return current.portal_token;
  var t=rid(28);
  var r=await sb.from('clients').update({portal_token:t}).eq('id',current.id);
  if(r.error){toast('Could not create link: '+r.error.message);return null;}
  current.portal_token=t;return t;
}
async function copyLink(kind){
  var t=await ensureToken();if(!t)return;
  var page=kind==='intake'?'intake.html?':kind==='proposal'?'sign.html?doc=proposal&':kind==='agreement'?'sign.html?doc=agreement&':'portal.html?';
  var url=siteBase()+page+'t='+encodeURIComponent(t);
  try{await navigator.clipboard.writeText(url);toast(kind.charAt(0).toUpperCase()+kind.slice(1)+' link copied');}
  catch(e){prompt('Copy this link:',url);}
}

var payments=[];
async function loadPayments(){

async function addPayment(){
  if(!current||!current.id){toast('Save the client first');return;}
  var amt=val('pay_amt'),kind=val('pay_kind'),on=val('pay_on'),note=val('pay_note');
  if(!money(amt)){toast('Enter an amount');return;}

async function delPayment(id){

/* ============================ v3: notifications, automations, activity ============================ */
var notifs=[], rtChannel=null;
function timeAgo(ts){if(!ts)return '';var d=(Date.now()-new Date(ts).getTime())/1000;if(d<60)return 'just now';if(d<3600)return Math.floor(d/60)+'m ago';if(d<86400)return Math.floor(d/3600)+'h ago';return Math.floor(d/86400)+'d ago';}
async function loadActivity(){
  if(demo||!sb){notifs=[];renderBell();return;}
  var r=await sb.from('activity').select('*').order('created_at',{ascending:false}).limit(40);
  if(!r.error)notifs=r.data||[];
  renderBell();
}
function unreadCount(){return notifs.filter(function(a){return !a.read;}).length;}
function renderBell(){var n=unreadCount(),b=$('bellBadge');if(!b)return;if(n>0){b.textContent=n>9?'9+':String(n);b.classList.remove('hidden');}else{b.classList.add('hidden');}}
function renderBellPanel(){
  var p=$('bellPanel');
  p.innerHTML=notifs.length?notifs.slice(0,20).map(function(a){
    return '<div class="bell-item'+(a.read?'':' unread')+'"'+(a.client_id?' style="cursor:pointer" onclick="selectClient(\''+a.client_id+'\');closeBell()"':'')+'><div class="bt">'+esc(a.title||'')+'</div><div class="bd">'+esc(timeAgo(a.created_at))+'</div></div>';
  }).join(''):'<div class="bell-empty">No notifications yet.</div>';
}
async function toggleBell(){
  var p=$('bellPanel');
  if(p.classList.contains('hidden')){
    renderBellPanel();p.classList.remove('hidden');
    if(unreadCount()&&!demo&&sb){await sb.from('activity').update({read:true}).eq('read',false);notifs.forEach(function(a){a.read=true;});renderBell();}
  }else{p.classList.add('hidden');}
}
function closeBell(){var p=$('bellPanel');if(p)p.classList.add('hidden');}
function subscribeRealtime(){
  if(rtChannel||demo||!sb)return;
  rtChannel=sb.channel('ccd-activity')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'activity'},function(p){notifs.unshift(p.new);renderBell();toast((p.new.title||'New activity'));if(!current)renderMain();})
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'payments'},function(){loadDashboard().then(function(){if(!current)renderMain();});})
    .subscribe();
}
function reminders(){
  var out=[],now=Date.now();
  clients.forEach(function(c){
    if(['Closed','Active','Kick-off'].indexOf(c.stage)>=0||!c.created_at)return;
    var age=(now-new Date(c.created_at).getTime())/86400000;
    if(c.stage==='Proposal Sent'&&!c.signed_proposal&&age>=2)out.push({c:c,msg:'Proposal unsigned · '+Math.floor(age)+'d'});
    else if((c.stage==='Signed'||c.stage==='Deposit Paid')&&!c.intake_submitted&&age>=2)out.push({c:c,msg:'Intake not done · '+Math.floor(age)+'d'});
  });
  return out;
}
async function autoLogPayment(stage,cl){
  cl=cl||current; if(demo||!cl||!cl.id)return;
  var map={'Deposit Paid':{kind:'Deposit',amt:money(cl.deposit)},'Active':{kind:'Balance',amt:money(cl.balance)},'Closed':{kind:'Balance',amt:money(cl.balance)}};
  var m=map[stage];if(!m||m.amt<=0)return;
  var ex=await sb.from('payments').select('id').eq('client_id',cl.id).eq('kind',m.kind).limit(1);
  if(ex.data&&ex.data.length)return;
  var r=await sb.from('payments').insert({client_id:cl.id,amount:m.amt,kind:m.kind,note:'Auto-logged on stage change'});
  if(!r.error){toast('Logged '+m.kind+' '+fmt(m.amt));await loadDashboard();}
}
async function exportRevenue(){
  if(demo||!sb){toast('Connect Supabase first');return;}
  var r=await sb.from('payments').select('paid_on,amount,kind,note,client_id');
  if(r.error){toast('Export failed');return;}
  var byId={};clients.forEach(function(c){byId[c.id]=c.business;});
  var rows=[['Date','Client','Kind','Amount','Note']];
  (r.data||[]).sort(function(a,b){return (a.paid_on||'')<(b.paid_on||'')?1:-1;}).forEach(function(p){
    rows.push([p.paid_on||'',byId[p.client_id]||'',p.kind||'',p.amount,String(p.note||'')]);
  });
  var csv=rows.map(function(row){return row.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='cursor-cat-revenue.csv';a.click();
}
function showDashboard(){current=null;boardMode=false;currentTab='details';renderSidebar();renderMain();}

var charts={};
function chartOpts(){return {responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:function(v){return '$'+v;}}}}};}
function drawDashCharts(){
  if(typeof Chart==='undefined')return;
  var rc=$('chRev'),pc=$('chPipe');
  if(charts.rev){charts.rev.destroy();charts.rev=null;}
  if(charts.pipe){charts.pipe.destroy();charts.pipe=null;}
  if(rc){
    var keys=Object.keys(revSeries).sort();
    charts.rev=new Chart(rc,{type:'bar',data:{labels:keys.length?keys:['No data'],datasets:[{data:keys.length?keys.map(function(k){return revSeries[k];}):[0],backgroundColor:'#2f64e6',borderRadius:4}]},options:chartOpts()});
  }
  if(pc){
    var labels=STAGES.filter(function(s){return s!=='Closed';}),byStage={};
    labels.forEach(function(s){byStage[s]=0;});
    clients.forEach(function(c){if(c.stage!=='Closed'&&byStage[c.stage]!=null)byStage[c.stage]+=money(c.total);});
    charts.pipe=new Chart(pc,{type:'bar',data:{labels:labels,datasets:[{data:labels.map(function(s){return byStage[s]||0;}),backgroundColor:'#08090a',borderRadius:4}]},options:chartOpts()});
  }
  var fc=$('chFunnel');
  if(fc){if(charts.funnel){charts.funnel.destroy();charts.funnel=null;}
    var idx={};STAGES.forEach(function(s,i){idx[s]=i;});
    var ord=[['Leads','Prospect'],['Proposal','Proposal Sent'],['Signed','Signed'],['Deposit','Deposit Paid'],['Active','Active']];
    var fl=ord.map(function(o){var th=idx[o[1]];return clients.filter(function(c){return c.stage!=='Closed'&&idx[c.stage]>=th;}).length;});
    charts.funnel=new Chart(fc,{type:'bar',data:{labels:ord.map(function(o){return o[0];}),datasets:[{data:fl,backgroundColor:'#2f64e6',borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{precision:0}}}}});
  }
}

/* ============================ v5: lite send + AI prompt ============================ */
async function emailLink(kind){
  var t=await ensureToken();if(!t)return;
  var page=kind==='intake'?'intake.html?':kind==='proposal'?'sign.html?doc=proposal&':kind==='agreement'?'sign.html?doc=agreement&':'portal.html?';
  var url=siteBase()+page+'t='+encodeURIComponent(t);
  var labels={portal:'your onboarding portal',intake:'your intake form',proposal:'your proposal to review and sign',agreement:'your service agreement to sign'};
  var subj='Cursor Cat Digital — '+(labels[kind]||'your link');
  var body='Hi '+(current.contact_name||'there')+',\n\nHere is '+(labels[kind]||'your link')+':\n'+url+'\n\nAny questions, just reply.\n\n— Brent\nCursor Cat Digital';
  location.href='mailto:'+encodeURIComponent(current.email||'')+'?subject='+encodeURIComponent(subj)+'&body='+encodeURIComponent(body);
}
function copyAIPrompt(){
  var c=current||{};
  var p='You are a senior local-marketing strategist for an Alberta web design and growth studio.\n'+
    'Client: '+(c.business||'')+' in '+(c.city||'')+'. Website: '+(c.website||'(none)')+'. Top services: '+(c.top_services||'(unknown)')+'. Top competitor: '+(c.competitor||'(unknown)')+'. Offer: '+(c.offer||'')+'.\n\n'+
    'Write, ready to paste into a CRM:\n'+
    '1) GAPS - 3 specific things holding them back online (one per line).\n'+
    '2) DELIVERABLES - 5 lines formatted "Title | Description".\n'+
    '3) TIMELINE - 4 lines formatted "Week | Description".\n'+
    '4) Suggested pricing: total and a 50% deposit for the '+(c.offer||'project')+'.\n'+
    'Be concrete and benefit-focused.';
  try{navigator.clipboard.writeText(p);toast('AI prompt copied — paste into Claude or ChatGPT');}catch(e){prompt('Copy this prompt:',p);}
}

/* ============================ v6: kanban, command palette, MRR ============================ */
var boardMode=false;
function showBoard(){current=null;boardMode=true;var sd=$('sidebar');if(sd)sd.classList.remove('show');renderSidebar();renderMain();}
function boardHTML(){
  var cols=STAGES.map(function(s){
    var items=clients.filter(function(c){return c.stage===s;});
    return '<div class="kcol" ondragover="allowDrop(event)" ondragleave="this.classList.remove(\'drag-over\')" ondrop="dropStage(event,\''+esc(s)+'\')"><div class="kcol-h">'+esc(s)+'<span>'+items.length+'</span></div>'+
      items.map(function(c){return '<div class="kcard" draggable="true" ondragstart="dragStart(event,\''+c.id+'\')" onclick="selectClient(\''+c.id+'\')"><div class="kc-name">'+esc(c.business||'Untitled')+'</div><div class="kc-sub">'+esc([c.contact_name,c.total].filter(Boolean).join(' · '))+'</div></div>';}).join('')+
    '</div>';
  }).join('');
  return '<div class="client-head"><div class="ch-top"><div><div class="ch-name">Pipeline</div><div class="ch-meta">Drag a client to change its stage</div></div><div class="ch-actions"><button class="btn-ghost btn btn-sm" onclick="showDashboard()">Dashboard</button><button class="btn btn-sm" onclick="newClient()">+ New Client</button></div></div></div><div class="board">'+cols+'</div>';
}
function dragStart(ev,id){ev.dataTransfer.setData('text/plain',id);ev.dataTransfer.effectAllowed='move';}
function allowDrop(ev){ev.preventDefault();ev.currentTarget.classList.add('drag-over');}
async function dropStage(ev,stage){ev.preventDefault();ev.currentTarget.classList.remove('drag-over');var id=ev.dataTransfer.getData('text/plain');await moveClientStage(id,stage);}
async function moveClientStage(id,stage){
  var cl=clients.filter(function(c){return c.id===id;})[0];if(!cl||cl.stage===stage)return;
  if(demo){cl.stage=stage;renderMain();return;}
  var r=await sb.from('clients').update({stage:stage}).eq('id',id);if(r.error){toast('Move failed');return;}
  cl.stage=stage;toast((cl.business||'Client')+' → '+stage);await autoLogPayment(stage,cl);await loadClients();
}

var cmdCache=[];
function openCmd(){var o=$('cmdk');o.classList.add('open');var inp=$('cmdkInput');inp.value='';renderCmd('');inp.focus();}
function closeCmd(){$('cmdk').classList.remove('open');}
function cmdItems(q){q=(q||'').toLowerCase();var out=[];
  [['Dashboard',showDashboard],['Pipeline board',showBoard],['New client',newClient]].forEach(function(a){if(a[0].toLowerCase().indexOf(q)>=0)out.push({l:a[0],sub:'Action',fn:a[1]});});
  clients.forEach(function(c){if(!q||(c.business||'').toLowerCase().indexOf(q)>=0||(c.contact_name||'').toLowerCase().indexOf(q)>=0)out.push({l:c.business||'Untitled',sub:c.stage,fn:(function(cc){return function(){selectClient(cc.id);};})(c)});});
  return out.slice(0,12);
}
function renderCmd(q){var items=cmdItems(q);cmdCache=items;var list=$('cmdkList');list.innerHTML=items.length?items.map(function(it,i){return '<div class="cmdk-item'+(i===0?' active':'')+'" onclick="runCmd('+i+')"><span>'+esc(it.l)+'</span><span class="cmdk-sub">'+esc(it.sub)+'</span></div>';}).join(''):'<div class="cmdk-empty">No matches</div>';}
function runCmd(i){var it=cmdCache[i];if(!it)return;closeCmd();it.fn();}

function mrr(){return clients.reduce(function(s,c){return (['Active','Kick-off'].indexOf(c.stage)>=0)?s+money(c.monthly):s;},0);}
function avgDeal(){var v=clients.map(function(c){return money(c.total);}).filter(function(x){return x>0;});return v.length?v.reduce(function(a,b){return a+b;},0)/v.length:0;}
function winRate(){var won=clients.filter(function(c){return ['Deposit Paid','Intake','Kick-off','Active'].indexOf(c.stage)>=0;}).length;var lost=clients.filter(function(c){return c.stage==='Closed';}).length;var t=won+lost;return t?Math.round(won/t*100):0;}
async function logMonthlyRetainers(){
  if(demo||!sb){toast('Connect Supabase first');return;}
  var month=new Date().toISOString().slice(0,7),n=0;
  for(var i=0;i<clients.length;i++){var c=clients[i],amt=money(c.monthly);
    if(amt<=0||['Active','Kick-off'].indexOf(c.stage)<0)continue;
    var ex=await sb.from('payments').select('id').eq('client_id',c.id).eq('kind','Retainer').gte('paid_on',month+'-01');
    if(ex.data&&ex.data.length)continue;
    var r=await sb.from('payments').insert({client_id:c.id,amount:amt,kind:'Retainer',note:'Monthly retainer '+month});
    if(!r.error)n++;
  }
  toast(n?('Logged '+n+' retainer(s)'):'Retainers already logged this month');await loadDashboard();renderMain();
}

/* ============================ WIRE-UP ============================ */
$('loginForm').addEventListener('submit',doLogin);
$('dashBtn').addEventListener('click',showDashboard);
$('menuBtn').addEventListener('click',function(){$('sidebar').classList.toggle('show');});
$('brandHome').addEventListener('click',function(){showDashboard();$('sidebar').classList.remove('show');});
$('bellBtn').addEventListener('click',function(e){e.stopPropagation();toggleBell();});
document.addEventListener('click',function(e){var p=$('bellPanel'),b=$('bellBtn');if(p&&!p.classList.contains('hidden')&&!p.contains(e.target)&&b&&!b.contains(e.target))p.classList.add('hidden');});
$('logoutBtn').addEventListener('click',doLogout);
$('newClientBtn').addEventListener('click',newClient);
$('demoBtn').addEventListener('click',enterDemo);
$('search').addEventListener('input',function(e){filter=e.target.value;renderSidebar();});
$('settingsBtn').addEventListener('click',function(){openSettings(false);});
$('openSettingsFromLogin').addEventListener('click',function(){openSettings(false);});
$('closeSettings').addEventListener('click',function(){$('settingsOverlay').classList.remove('open');});
$('saveSettings').addEventListener('click',function(){
  var u=val('sbUrl').trim(),k=val('sbKey').trim();
  if(!u||!k){toast('Both fields required');return;}
  localStorage.setItem(SB_URL_K,u);localStorage.setItem(SB_KEY_K,k);location.reload();
});
function openSettings(force){var c=getCfg();$('sbUrl').value=c.url;$('sbKey').value=c.key;$('settingsOverlay').classList.add('open');if(force)$('login').classList.remove('hidden');}
$('boardBtn').addEventListener('click',showBoard);
$('cmdkInput').addEventListener('input',function(e){renderCmd(e.target.value);});
$('cmdkInput').addEventListener('keydown',function(e){if(e.key==='Enter'){runCmd(0);}else if(e.key==='Escape'){closeCmd();}});
$('cmdk').addEventListener('click',function(e){if(e.target===$('cmdk'))closeCmd();});
document.addEventListener('keydown',function(e){if((e.metaKey||e.ctrlKey)&&(e.key==='k'||e.key==='K')){e.preventDefault();openCmd();}});

boot();
</script>
